<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#000000">
  <title>musikkubed — Music Player</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,400&display=swap" rel="stylesheet">
  <style>
/* ══════════════════════════════════════════════════════════════
   MUSIKKUBED — Music Player Styles
   Design: Dark luxury, gold accents, Syne + DM Sans
══════════════════════════════════════════════════════════════ */

/* ─── Design Tokens ─────────────────────────────────────── */
:root {
  --bg-primary:      #000000;
  --bg-secondary:    #0a0a0e;
  --bg-elevated:     #181821;
  --bg-card:         #0c0c0f;
  --bg-hover:        rgba(255,255,255,0.045);
  --bg-active:       rgba(255,255,255,0.08);

  --accent:          #d66ac6;
  --accent-hover:    #000000;
  --accent-dim:      rgba(0, 0, 0, 0.15);
  --accent-dim2:     rgba(201,168,76,0.08);

  --text-primary:    #eeedf4;
  --text-secondary:  #9390a8;
  --text-muted:      #4e4c5e;
  --text-on-accent:  #0c0c11;

  --border:          rgba(255,255,255,0.065);
  --border-strong:   rgba(255,255,255,0.12);
  --border-accent:   rgba(0, 0, 0, 0.35);

  --sidebar-width:   230px;
  --player-height:   90px;
  --header-height:   64px;

  --font-display:    'Syne', sans-serif;
  --font-body:       'DM Sans', sans-serif;

  --radius-sm:       6px;
  --radius-md:       10px;
  --radius-lg:       16px;
  --radius-full:     9999px;

  --shadow-sm:       0 2px 8px rgba(0,0,0,0.35);
  --shadow-md:       0 4px 20px rgba(0,0,0,0.5);
  --shadow-lg:       0 8px 40px rgba(0,0,0,0.6);

  --transition:      0.18s ease;
  --transition-slow: 0.3s ease;
}

/* ─── Reset ──────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; -webkit-text-size-adjust: 100%; }
body {
  background: var(--bg-primary);
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 14px;
  line-height: 1.5;
  overflow: hidden;
  height: 100vh;
  user-select: none;
  -webkit-font-smoothing: antialiased;
}
button { cursor: pointer; background: none; border: none; color: inherit; font-family: inherit; font-size: inherit; }
input, select { font-family: inherit; font-size: inherit; }
svg { display: block; flex-shrink: 0; }
.hidden { display: none !important; }

/* ─── App Layout ─────────────────────────────────────────── */
#app {
  display: grid;
  grid-template-columns: var(--sidebar-width) 1fr;
  grid-template-rows: 1fr var(--player-height);
  height: 100vh;
  overflow: hidden;
}

/* ══════════════════════════════════════════════════════════
   SIDEBAR
══════════════════════════════════════════════════════════ */
.sidebar {
  grid-row: 1;
  grid-column: 1;
  background: var(--bg-secondary);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  z-index: 50;
}

.sidebar-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 20px 20px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.logo-text {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 17px;
  letter-spacing: 0.02em;
  color: var(--text-primary);
}

/* Nav */
.sidebar-nav {
  padding: 16px 10px 8px;
  flex-shrink: 0;
}
.nav-section-label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-muted);
  padding: 0 10px 8px;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  padding: 8px 10px;
  border-radius: var(--radius-sm);
  color: var(--text-secondary);
  font-size: 13.5px;
  font-weight: 400;
  transition: background var(--transition), color var(--transition);
  text-align: left;
}
.nav-item:hover { background: var(--bg-hover); color: var(--text-primary); }
.nav-item.active { background: var(--accent-dim2); color: var(--accent); }
.nav-item.active svg { opacity: 1; }
.nav-item svg { opacity: 0.6; flex-shrink: 0; }

/* Playlists section */
.sidebar-playlists {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 8px 10px;
  border-top: 1px solid var(--border);
}
.sidebar-playlists::-webkit-scrollbar { width: 4px; }
.sidebar-playlists::-webkit-scrollbar-thumb { background: var(--bg-elevated); border-radius: 2px; }

.nav-section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 10px 8px;
}

.btn-add-playlist {
  width: 22px; height: 22px;
  display: flex; align-items: center; justify-content: center;
  border-radius: var(--radius-sm);
  color: var(--text-muted);
  transition: background var(--transition), color var(--transition);
}
.btn-add-playlist:hover { background: var(--bg-hover); color: var(--accent); }

/* Playlist nav items */
.playlist-nav-item {
  display: flex;
  align-items: center;
  gap: 8px;
  width: 100%;
  padding: 7px 10px;
  border-radius: var(--radius-sm);
  color: var(--text-secondary);
  font-size: 13px;
  font-weight: 400;
  transition: background var(--transition), color var(--transition);
  text-align: left;
  position: relative;
}
.playlist-nav-item:hover { background: var(--bg-hover); color: var(--text-primary); }
.playlist-nav-item.active { color: var(--accent); background: var(--accent-dim2); }
.playlist-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--bg-elevated);
  border: 1.5px solid var(--text-muted);
  flex-shrink: 0;
}
.playlist-nav-item.active .playlist-dot { background: var(--accent); border-color: var(--accent); }
.playlist-name {
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.playlist-count {
  font-size: 11px;
  color: var(--text-muted);
  flex-shrink: 0;
}
.playlist-nav-actions {
  display: none;
  gap: 2px;
  position: absolute;
  right: 6px;
}
.playlist-nav-item:hover .playlist-nav-actions { display: flex; }
.playlist-nav-actions button {
  width: 20px; height: 20px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 4px;
  color: var(--text-muted);
  font-size: 11px;
  transition: background var(--transition), color var(--transition);
}
.playlist-nav-actions button:hover { background: var(--bg-elevated); color: var(--text-primary); }

/* Sidebar footer */
.sidebar-footer {
  padding: 12px 14px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.btn-upload-sidebar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  border: 1px dashed var(--border-strong);
  color: var(--text-secondary);
  font-size: 12.5px;
  transition: all var(--transition);
}
.btn-upload-sidebar:hover {
  border-color: var(--border-accent);
  color: var(--accent);
  background: var(--accent-dim2);
}

/* ══════════════════════════════════════════════════════════
   MAIN CONTENT
══════════════════════════════════════════════════════════ */
#main-content {
  grid-row: 1;
  grid-column: 2;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg-primary);
}

/* Header */
.main-header {
  height: var(--header-height);
  padding: 0 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  gap: 16px;
}
.header-left { display: flex; align-items: center; gap: 12px; }
.view-title {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: -0.01em;
}
.header-actions { display: flex; gap: 8px; flex-shrink: 0; }

/* Action buttons */
.btn-action {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-strong);
  color: var(--text-secondary);
  font-size: 13px;
  font-weight: 400;
  transition: all var(--transition);
  white-space: nowrap;
}
.btn-action:hover { background: var(--bg-hover); color: var(--text-primary); border-color: var(--border-accent); }
.btn-action-primary {
  background: var(--accent-dim);
  border-color: var(--border-accent);
  color: var(--accent);
}
.btn-action-primary:hover { background: var(--accent); color: var(--text-on-accent); }

/* Mobile menu button */
.mobile-menu-btn {
  display: none;
  flex-direction: column;
  gap: 4px;
  padding: 4px;
  width: 28px;
}
.mobile-menu-btn span {
  display: block;
  width: 100%;
  height: 2px;
  background: var(--text-secondary);
  border-radius: 1px;
  transition: all var(--transition);
}

/* ─── Track List ─────────────────────────────────────────── */
.track-list-container {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 0;
}
.track-list-container::-webkit-scrollbar { width: 6px; }
.track-list-container::-webkit-scrollbar-thumb { background: var(--bg-elevated); border-radius: 3px; }
.track-list-container::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }

/* Track list header */
.track-list-header {
  display: grid;
  grid-template-columns: 44px 1fr 80px 50px 40px;
  align-items: center;
  padding: 8px 28px 8px 20px;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  background: var(--bg-primary);
  z-index: 10;
}
.track-list-header span {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-muted);
}
.col-num { text-align: center; }
.col-duration { text-align: right; display: flex; justify-content: flex-end; align-items: center; }

/* Track item */
.track-item {
  display: grid;
  grid-template-columns: 44px 1fr 80px 50px 40px;
  align-items: center;
  padding: 6px 28px 6px 20px;
  border-radius: 0;
  transition: background var(--transition);
  cursor: pointer;
  min-height: 52px;
}
.track-item:hover { background: var(--bg-hover); }
.track-item.playing { background: var(--accent-dim2); }
.track-item.playing .track-title { color: var(--accent); }

.track-num {
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-muted);
  font-size: 13px;
  font-weight: 400;
  font-variant-numeric: tabular-nums;
  height: 36px;
}
.track-num .play-indicator {
  display: none;
  color: var(--accent);
}
.track-item.playing .track-num .num-text { display: none; }
.track-item.playing .track-num .play-indicator { display: flex; }
.track-item:hover .track-num .num-text { opacity: 0; }
.track-item:hover:not(.playing) .track-num .play-indicator { display: flex; color: var(--text-primary); }
.track-item:hover:not(.playing) .track-num .num-text { display: none; }

/* Equalizer bars (playing indicator) */
.eq-bars {
  display: flex;
  align-items: flex-end;
  gap: 2px;
  height: 14px;
}
.eq-bars span {
  width: 3px;
  background: var(--accent);
  border-radius: 1.5px;
  animation: eq-bounce 0.8s ease-in-out infinite alternate;
}
.eq-bars span:nth-child(2) { animation-delay: 0.2s; }
.eq-bars span:nth-child(3) { animation-delay: 0.4s; }
@keyframes eq-bounce {
  0%   { height: 4px; }
  100% { height: 14px; }
}

.track-info {
  display: flex;
  flex-direction: column;
  gap: 2px;
  overflow: hidden;
  padding-right: 12px;
}
.track-art-mini {
  width: 36px; height: 36px;
  border-radius: 4px;
  background: var(--bg-elevated);
  overflow: hidden;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-muted);
  margin-right: 10px;
}
.track-art-mini img { width: 100%; height: 100%; object-fit: cover; }
.track-info-text { overflow: hidden; }
.track-title {
  font-size: 14px;
  font-weight: 400;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.track-artist {
  font-size: 12.5px;
  color: var(--text-secondary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.track-source {
  font-size: 11px;
  padding: 2px 7px;
  border-radius: var(--radius-full);
  font-weight: 400;
  white-space: nowrap;
}
.source-local {
  background: rgba(100,180,120,0.12);
  color: #6db890;
}
.source-url {
  background: rgba(100,140,210,0.12);
  color: #7ba8d8;
}
.source-unavailable {
  background: rgba(200,80,80,0.1);
  color: #c07070;
}

.track-duration {
  font-size: 13px;
  color: var(--text-secondary);
  text-align: right;
  font-variant-numeric: tabular-nums;
}
.track-actions {
  display: flex;
  justify-content: flex-end;
  gap: 2px;
  opacity: 0;
  transition: opacity var(--transition);
}
.track-item:hover .track-actions { opacity: 1; }
.track-action-btn {
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  border-radius: var(--radius-sm);
  color: var(--text-muted);
  transition: background var(--transition), color var(--transition);
  font-size: 14px;
  position: relative;
}
.track-action-btn:hover { background: var(--bg-elevated); color: var(--text-primary); }

/* Context menu */
.context-menu {
  position: fixed;
  background: var(--bg-elevated);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-lg);
  padding: 6px;
  z-index: 200;
  min-width: 180px;
  animation: context-in 0.12s ease;
}
@keyframes context-in { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
.context-item {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  padding: 8px 10px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  color: var(--text-secondary);
  text-align: left;
  transition: background var(--transition), color var(--transition);
}
.context-item:hover { background: var(--bg-hover); color: var(--text-primary); }
.context-item.danger:hover { color: #e07070; background: rgba(200,80,80,0.1); }
.context-divider { height: 1px; background: var(--border); margin: 4px 0; }

/* Empty state */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 80px 40px;
  text-align: center;
}
.empty-icon { opacity: 0.4; margin-bottom: 8px; }
.empty-title {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 600;
  color: var(--text-primary);
}
.empty-subtitle { font-size: 14px; color: var(--text-secondary); max-width: 300px; }
.empty-actions { display: flex; gap: 10px; margin-top: 8px; flex-wrap: wrap; justify-content: center; }

/* ══════════════════════════════════════════════════════════
   PLAYER BAR
══════════════════════════════════════════════════════════ */
#player-bar {
  grid-row: 2;
  grid-column: 1 / -1;
  background: var(--bg-secondary);
  border-top: 1px solid var(--border);
  display: grid;
  grid-template-columns: 1fr 2fr 1fr;
  align-items: center;
  padding: 0 24px;
  height: var(--player-height);
  gap: 16px;
  z-index: 40;
}

/* Now Playing */
.player-left {
  display: flex;
  align-items: center;
  gap: 12px;
  overflow: hidden;
  min-width: 0;
}

.now-playing-art {
  width: 52px; height: 52px;
  border-radius: var(--radius-sm);
  background: var(--bg-elevated);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  overflow: hidden;
  color: var(--text-muted);
  position: relative;
}
.art-img { width: 100%; height: 100%; object-fit: cover; }
.art-placeholder-icon { opacity: 0.4; }

.now-playing-info { overflow: hidden; min-width: 0; }
.np-title {
  font-size: 14px;
  font-weight: 500;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.np-artist {
  font-size: 12px;
  color: var(--text-secondary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* Center controls */
.player-center {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}

.playback-controls {
  display: flex;
  align-items: center;
  gap: 6px;
}

.ctrl-btn {
  width: 36px; height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius-full);
  color: var(--text-secondary);
  transition: background var(--transition), color var(--transition), transform 0.1s ease;
  position: relative;
}
.ctrl-btn:hover { color: var(--text-primary); background: var(--bg-hover); }
.ctrl-btn:active { transform: scale(0.93); }
.ctrl-btn.active { color: var(--accent); }
.ctrl-btn.active::after {
  content: '';
  position: absolute;
  bottom: 3px;
  left: 50%;
  transform: translateX(-50%);
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--accent);
}

/* Play button (larger) */
.play-btn {
  width: 42px; height: 42px;
  background: var(--accent-dim);
  color: var(--accent);
  border: 1px solid var(--border-accent);
}
.play-btn:hover { background: var(--accent); color: var(--text-on-accent); }

/* Repeat one badge */
.repeat-one-badge {
  position: absolute;
  top: 1px; right: 1px;
  width: 12px; height: 12px;
  background: var(--accent);
  color: var(--text-on-accent);
  border-radius: var(--radius-full);
  font-size: 8px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700;
  font-family: var(--font-body);
  line-height: 1;
}

/* Progress bar */
.progress-row {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
}

.time-label {
  font-size: 11px;
  color: var(--text-muted);
  font-variant-numeric: tabular-nums;
  width: 32px;
  flex-shrink: 0;
}
#current-time { text-align: right; }
#track-duration { text-align: left; }

.progress-bar {
  flex: 1;
  height: 4px;
  background: var(--bg-elevated);
  border-radius: var(--radius-full);
  cursor: pointer;
  position: relative;
  transition: height var(--transition);
}
.progress-bar:hover { height: 6px; }
.progress-fill {
  position: absolute;
  left: 0; top: 0; bottom: 0;
  background: var(--accent);
  border-radius: var(--radius-full);
  width: 0%;
  transition: width 0.3s linear;
  pointer-events: none;
}
.progress-bar.seeking .progress-fill { transition: none; }
.progress-thumb {
  position: absolute;
  top: 50%;
  left: 0%;
  transform: translate(-50%, -50%);
  width: 12px; height: 12px;
  border-radius: var(--radius-full);
  background: var(--accent);
  opacity: 0;
  transition: opacity var(--transition);
  pointer-events: none;
}
.progress-bar:hover .progress-thumb { opacity: 1; }

/* Volume */
.player-right {
  display: flex;
  align-items: center;
  gap: 8px;
  justify-content: flex-end;
}

.ctrl-btn-sm {
  width: 30px; height: 30px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius-full);
  color: var(--text-secondary);
  transition: color var(--transition);
  flex-shrink: 0;
}
.ctrl-btn-sm:hover { color: var(--text-primary); }

/* Custom volume slider */
.volume-slider {
  -webkit-appearance: none;
  appearance: none;
  width: 100px;
  height: 4px;
  background: var(--bg-elevated);
  border-radius: var(--radius-full);
  outline: none;
  cursor: pointer;
  transition: height var(--transition);
}
.volume-slider:hover { height: 6px; }
.volume-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 12px; height: 12px;
  border-radius: var(--radius-full);
  background: var(--accent);
  cursor: pointer;
  transition: transform var(--transition);
}
.volume-slider:hover::-webkit-slider-thumb { transform: scale(1.2); }
.volume-slider::-moz-range-thumb {
  width: 12px; height: 12px;
  border: none;
  border-radius: var(--radius-full);
  background: var(--accent);
  cursor: pointer;
}
/* Track fill for volume slider (pseudo-gradient via accent) */
.volume-slider {
  background: linear-gradient(to right, var(--accent) 0%, var(--bg-elevated) 0%);
}

/* ══════════════════════════════════════════════════════════
   MODALS
══════════════════════════════════════════════════════════ */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(8,8,12,0.75);
  backdrop-filter: blur(4px);
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: overlay-in 0.2s ease;
}
@keyframes overlay-in { from { opacity: 0; } to { opacity: 1; } }

.modal {
  background: var(--bg-elevated);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  width: 100%;
  max-width: 460px;
  margin: 16px;
  animation: modal-in 0.2s cubic-bezier(0.34, 1.36, 0.64, 1);
}
@keyframes modal-in {
  from { opacity: 0; transform: scale(0.92) translateY(16px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--border);
}
.modal-title {
  font-family: var(--font-display);
  font-size: 17px;
  font-weight: 700;
  color: var(--text-primary);
}
.modal-close {
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  border-radius: var(--radius-sm);
  color: var(--text-muted);
  transition: background var(--transition), color var(--transition);
}
.modal-close:hover { background: var(--bg-hover); color: var(--text-primary); }

.modal-body { padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; }
.modal-footer {
  padding: 16px 24px 20px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 10px;
  justify-content: flex-end;
}

/* Form elements */
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-label {
  font-size: 12.5px;
  font-weight: 500;
  color: var(--text-secondary);
  letter-spacing: 0.02em;
}
.required { color: var(--accent); }
.optional { color: var(--text-muted); font-weight: 400; }
.form-hint { font-size: 11.5px; color: var(--text-muted); }

.form-input, .form-select {
  background: var(--bg-card);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-sm);
  padding: 9px 12px;
  color: var(--text-primary);
  font-size: 13.5px;
  outline: none;
  transition: border-color var(--transition);
  width: 100%;
}
.form-input:focus, .form-select:focus { border-color: var(--accent); }
.form-input::placeholder { color: var(--text-muted); }
.form-select { cursor: pointer; }
.form-select option { background: var(--bg-card); }

.btn-primary {
  padding: 8px 20px;
  background: var(--accent);
  color: var(--text-on-accent);
  border-radius: var(--radius-sm);
  font-size: 13.5px;
  font-weight: 600;
  font-family: var(--font-body);
  transition: background var(--transition), transform 0.1s ease;
}
.btn-primary:hover { background: var(--accent-hover); }
.btn-primary:active { transform: scale(0.97); }

.btn-secondary {
  padding: 8px 20px;
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-sm);
  color: var(--text-secondary);
  font-size: 13.5px;
  transition: background var(--transition), color var(--transition);
}
.btn-secondary:hover { background: var(--bg-hover); color: var(--text-primary); }

/* Playlist picker (in modal) */
.playlist-picker-list { display: flex; flex-direction: column; gap: 4px; }
.playlist-picker-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  color: var(--text-secondary);
  transition: background var(--transition), color var(--transition);
}
.playlist-picker-item:hover { background: var(--bg-hover); color: var(--text-primary); }
.playlist-picker-item.in-playlist { color: var(--accent); }
.playlist-picker-item.in-playlist .picker-check { opacity: 1; }
.picker-check {
  margin-left: auto;
  opacity: 0;
  color: var(--accent);
  font-size: 14px;
}

.btn-add-new-pl {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  color: var(--text-muted);
  font-size: 13px;
  border-top: 1px solid var(--border);
  margin-top: 8px;
  width: 100%;
  text-align: left;
  transition: background var(--transition), color var(--transition);
}
.btn-add-new-pl:hover { background: var(--bg-hover); color: var(--accent); }

/* ══════════════════════════════════════════════════════════
   TOAST NOTIFICATIONS
══════════════════════════════════════════════════════════ */
.toast-container {
  position: fixed;
  bottom: calc(var(--player-height) + 16px);
  right: 20px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  z-index: 300;
  pointer-events: none;
}
.toast {
  background: var(--bg-elevated);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-md);
  padding: 10px 16px;
  font-size: 13px;
  color: var(--text-primary);
  box-shadow: var(--shadow-md);
  animation: toast-in 0.3s cubic-bezier(0.34, 1.36, 0.64, 1);
  max-width: 280px;
}
.toast.toast-success { border-left: 3px solid #6db890; }
.toast.toast-error { border-left: 3px solid #e07070; }
.toast.toast-out { animation: toast-out 0.3s ease forwards; }
@keyframes toast-in {
  from { opacity: 0; transform: translateX(20px); }
  to   { opacity: 1; transform: translateX(0); }
}
@keyframes toast-out {
  from { opacity: 1; transform: translateX(0); }
  to   { opacity: 0; transform: translateX(20px); }
}

/* ══════════════════════════════════════════════════════════
   SIDEBAR OVERLAY (mobile)
══════════════════════════════════════════════════════════ */
.sidebar-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 45;
}

/* ══════════════════════════════════════════════════════════
   SCROLLBAR GLOBAL
══════════════════════════════════════════════════════════ */
* { scrollbar-width: thin; scrollbar-color: var(--bg-elevated) transparent; }

/* ══════════════════════════════════════════════════════════
   LOADING STATE
══════════════════════════════════════════════════════════ */
.track-item.loading .track-title { opacity: 0.5; }
.track-item.loading .track-duration::after { content: '…'; }

/* ══════════════════════════════════════════════════════════
   RESPONSIVE — TABLET (≤ 900px)
══════════════════════════════════════════════════════════ */
@media (max-width: 900px) {
  :root { --sidebar-width: 200px; }
  .col-source { display: none; }
  .track-list-header { grid-template-columns: 44px 1fr 50px 40px; }
  .track-item { grid-template-columns: 44px 1fr 50px 40px; }
  .track-source { display: none; }
  .volume-slider { width: 80px; }
}

/* ══════════════════════════════════════════════════════════
   RESPONSIVE — MOBILE (≤ 680px)
══════════════════════════════════════════════════════════ */
@media (max-width: 680px) {
  :root {
    --player-height: 100px;
    --sidebar-width: 260px;
  }

  /* App layout: single column */
  #app {
    grid-template-columns: 1fr;
    grid-template-rows: 1fr var(--player-height);
  }

  /* Sidebar: slide-in drawer */
  .sidebar {
    position: fixed;
    top: 0; left: 0; bottom: 0;
    z-index: 50;
    transform: translateX(-100%);
    transition: transform var(--transition-slow);
    border-right: 1px solid var(--border-strong);
    box-shadow: var(--shadow-lg);
  }
  .sidebar.open { transform: translateX(0); }

  /* Main fills full width */
  #main-content { grid-column: 1; }

  /* Show hamburger */
  .mobile-menu-btn { display: flex; }

  /* Player bar: 2-row layout */
  #player-bar {
    grid-template-columns: 1fr;
    grid-template-rows: auto auto;
    padding: 10px 16px 8px;
    gap: 8px;
    height: var(--player-height);
  }
  .player-left {
    display: none; /* Hide on mobile to save space */
  }
  .player-center { width: 100%; }
  .player-right {
    position: absolute;
    top: 12px; right: 16px;
  }
  .volume-slider { width: 70px; }

  /* Simpler track list on mobile */
  .track-list-header { grid-template-columns: 36px 1fr 40px; padding: 8px 16px 8px 12px; }
  .track-item { grid-template-columns: 36px 1fr 40px; padding: 6px 16px 6px 12px; }
  .col-duration { display: flex; }
  .col-actions, .track-actions { display: none; }
  .main-header { padding: 0 16px; }
  .track-list-container { padding-bottom: 0; }
  .view-title { font-size: 17px; }
  .btn-action span { display: none; }
  .btn-action { padding: 6px 10px; }
}

/* ══════════════════════════════════════════════════════════
   MISC ANIMATIONS
══════════════════════════════════════════════════════════ */
@keyframes pulse-ring {
  0%   { box-shadow: 0 0 0 0 rgba(201,168,76,0.3); }
  70%  { box-shadow: 0 0 0 8px rgba(201,168,76,0); }
  100% { box-shadow: 0 0 0 0 rgba(201,168,76,0); }
}

/* Track item enter animation */
.track-item {
  animation: track-enter 0.25s ease forwards;
}
@keyframes track-enter {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Drag over playlist highlight */
.playlist-drop-target { background: var(--accent-dim2) !important; }

          <div class="form-group">
            <label class="form-label">Artist</label>
            <input type="text" id="url-artist-input" class="form-input" placeholder="Artist name">
          </div>
          <div class="form-group">
            <label class="form-label">Add to Playlist</label>
            <select id="url-playlist-select" class="form-select">
              <option value="">— Library only —</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Artwork URL <span class="optional">(optional)</span></label>
          <input type="url" id="url-artwork-input" class="form-input" placeholder="https://example.com/cover.jpg">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" data-close="add-url-modal">Cancel</button>
        <button class="btn-primary" id="add-url-submit">Add Track</button>
      </div>
    </div>

    <!-- Create / Rename Playlist Modal -->
    <div id="playlist-modal" class="modal hidden">
      <div class="modal-header">
        <h2 class="modal-title" id="playlist-modal-title">New Playlist</h2>
        <button class="modal-close" data-close="playlist-modal" aria-label="Close">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M3 3L13 13M13 3L3 13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Playlist Name</label>
          <input type="text" id="playlist-name-input" class="form-input" placeholder="My Playlist" maxlength="60">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" data-close="playlist-modal">Cancel</button>
        <button class="btn-primary" id="playlist-submit">Create</button>
      </div>
    </div>

    <!-- Add to Playlist Modal -->
    <div id="add-to-playlist-modal" class="modal hidden">
      <div class="modal-header">
        <h2 class="modal-title">Add to Playlist</h2>
        <button class="modal-close" data-close="add-to-playlist-modal" aria-label="Close">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M3 3L13 13M13 3L3 13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <div id="playlist-picker-list" class="playlist-picker-list">
          <!-- Rendered by JS -->
        </div>
        <button class="btn-add-new-pl" id="add-new-pl-from-track">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M7 2V12M2 7H12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          New Playlist
        </button>
      </div>
    </div>

  </div>

  <!-- Hidden file input -->
  <input type="file" id="file-input" accept="audio/*" multiple style="display:none">

  <!-- Toast notification area -->
  <div id="toast-container" class="toast-container" aria-live="polite"></div>

  <script src="script.js"></script>
</body>
</html>
